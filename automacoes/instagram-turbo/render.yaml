# ============================================================
# Blueprint da Render — Publicador Orgânico (Instagram), DOIS crons
# ============================================================
# Dois ritmos de propósito (ver DEPLOY-RENDER.md):
#   1) RELEITURA do ClickUp  → de hora em hora  (--mode report) — parte PESADA,
#      atualiza o calendário com os cards novos do dia.
#   2) PUBLICAÇÃO + botões    → a cada 5 min     (--mode publish) — parte LEVE,
#      não relê o ClickUp inteiro; só pergunta ao Cortex "tem algo pra postar /
#      algum botão clicado?". Mantém o post no horário e o "Soltar agora" rápido.
#
# ⚠️  Este arquivo está DENTRO de automacoes/instagram-turbo/ de propósito —
#     assim NÃO vira um Blueprint ativo (a Render só lê render.yaml na RAIZ do
#     repo) e não mexe no web service do Cortex já configurado no dashboard.
#     Para usar como IaC, mova-o pra raiz e conecte como Blueprint (revise antes).
#     RECOMENDADO: criar os 2 Cron Jobs pelo dashboard com os valores abaixo.
#
# Secrets (sync:false) e o Secret File do Google são preenchidos no dashboard.
# ============================================================

# Variáveis compartilhadas pelos dois crons (preencha os sync:false no dashboard).
envVarGroups:
  - name: organico-instagram
    envVars:
      - key: DRY_RUN
        value: "0"                    # 0 = publica de verdade. Comece com "1" pra validar!
      # ---- ClickUp ----
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: CLICKUP_WORKSPACE_ID
        value: "31021986"
      - key: CLICKUP_LIST_ID_INSTAGRAM
        value: "901300920768"
      - key: CLICKUP_POSTING_DATE_FIELD
        value: "Data de postagem"     # p minúsculo de propósito (nome real do campo)
      - key: CLICKUP_HORARIO_FIELD
        value: "Horário"
      # ---- Google (Drive/Docs) — Secret File montado em runtime ----
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        value: "/etc/secrets/service-account.json"
      - key: GOOGLE_DRIVE_MESES_ROOT_FOLDER_ID
        value: "1yGxKCORxe7PipuYKY1yd508IWQyKgIIt"
      # ---- Re-host de mídia (Drive → GCS → signed URL pra Meta) ----
      - key: GCS_REHOST_BUCKET
        value: "turbo-ig-rehost"
      # ---- Meta / Instagram ----
      - key: META_LONG_LIVED_TOKEN     # ⚠️ expira a cada 60 dias — ver DEPLOY-RENDER.md
        sync: false
      - key: IG_BUSINESS_ACCOUNT_ID
        sync: false
      # ---- Anthropic (fallback de legenda quando o Doc está vazio) ----
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: "claude-sonnet-4-6"
      # ---- Telemetria pro painel "Orgânico" do Cortex ----
      - key: CORTEX_INGEST_URL
        value: "https://cortex.turbopartners.com.br/api/growth/organico/ingest"
      - key: ORGANICO_INGEST_TOKEN     # MESMO valor do .env do Cortex
        sync: false

services:
  # (1) RELEITURA do ClickUp — de hora em hora. Pega cards novos, atualiza calendário.
  - type: cron
    name: organico-report-instagram
    runtime: python
    plan: starter
    schedule: "0 * * * *"             # minuto 0 de toda hora (24x/dia ≫ 3x pedidas)
    rootDir: automacoes/instagram-turbo
    buildCommand: pip install -r requirements.txt
    startCommand: python -m agente.main_poller --once --mode report
    autoDeploy: true
    envVars:
      - fromGroup: organico-instagram

  # (2) PUBLICAÇÃO + botões — a cada 5 min. Leve (consulta o Cortex, não o ClickUp).
  - type: cron
    name: organico-publish-instagram
    runtime: python
    plan: starter
    schedule: "*/5 * * * *"           # a cada 5 min → post no horário + "Soltar agora" rápido
    rootDir: automacoes/instagram-turbo
    buildCommand: pip install -r requirements.txt
    startCommand: python -m agente.main_poller --once --mode publish
    autoDeploy: true
    envVars:
      - fromGroup: organico-instagram
